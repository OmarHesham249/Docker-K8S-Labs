name: Docker Automation

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. استنساخ الريبو الخارجي
      - name: Clone Repository
        run: git clone https://github.com/meldafrawi/basic-flask-app.git

      # 2. إنشاء ملف Dockerfile بالمحتوى المحدد داخل الفولدر المستنسخ
      - name: Create Dockerfile inside repo
        run: |
          cd basic-flask-app
          cat <<EOF > Dockerfile
          FROM alpine:latest
          COPY . /myapp
          WORKDIR /myapp
          RUN apk update && apk add python3 py3-flask
          ENTRYPOINT [ "python3","routes.py" ]
          EOF

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. بناء الصورة باستخدام المسار ./basic-flask-app
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest ./basic-flask-app

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest
